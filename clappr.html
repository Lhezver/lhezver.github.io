<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clappr</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.js"></script>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        #player {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="player"></div>
    <script>
    function inicializarReproductor() {
        var urlApi = 'https://project-e1ujz.vercel.app/api/post';

        var datosEnviar = {
            "url": "https://www.mitelefe.com/vidya/tokenize",
            "body": {
                "url": "https://telefeappmitelefe1.akamaized.net/hls/live/2037985/appmitelefe/TOK/master.m3u8"
            }
        };

        var xhr = new XMLHttpRequest();
        xhr.open("POST", urlApi, true);
        xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");

        // Manejar la respuesta del servidor
        xhr.onreadystatechange = function () {
            // El estado 4 significa que la petición ha terminado
            if (xhr.readyState === 4) {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var urlTokenizada = data.url;

                        var player = new Clappr.Player({
                            source: urlTokenizada,
                            parentId: '#player',
                            width: '100%',
                            height: '100%',
                            plugins: [ClapprLevelSelectorPlugin, DashShakaPlayback]
                        });
                    } catch (error) {
                        console.error('Error al procesar la respuesta:', error);
                    }
                } else {
                    console.error('Error en la petición al servidor. Estado:', xhr.status);
                }
            }
        };

        // Manejar errores de red
        xhr.onerror = function () {
            console.error('Error de red al obtener la URL tokenizada');
        };

        // Enviar la petición
        xhr.send(JSON.stringify(datosEnviar));
    }

    inicializarReproductor();
</script>
</body>

</html>
