<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSports</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.12/dist/controls.min.css" />
    <script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div id="container">
        <video id="video" class="shaka-video" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.12/dist/shaka-player.ui.js"></script>

    <script>
        async function init() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error("Browser no soportado");
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('container');

            const player = new shaka.Player();
            await player.attach(video);

            const ui = new shaka.ui.Overlay(player, container, video);
            const controls = ui.getControls();
            const uiPlayer = controls.getPlayer();

            ui.configure({
                addSeekBar: false,
                controlPanelElements: [
                    'play_pause',
                    'time_and_duration',
                    'mute',
                    'volume',
                    'spacer',
                    'quality',
                    'cast',
                    'fullscreen'
                ],
                castReceiverAppId: '07AEE832',
                castAndroidReceiverCompatible: true
            });

            player.configure({
                streaming: {
                    bufferingGoal: 30,
                    rebufferingGoal: 2
                },
                drm: {
                    clearKeys: {
                        "9afc53e82bb24c20a5835a84138f6c13": "abdd52917474f2342ff04f0d4722123a"
                    }
                }
            });

            const manifestUrl = "https://prope66bd35h.airspace-cdn.cbsivideo.com/out/v1/eb04c8bf15a94f14ad1d952659d422b7/manifest.mpd";

            try {
                await uiPlayer.load(manifestUrl);
            } catch (e) {
                console.error(e);
            }
        }

        init();
    </script>

</body>

</html>
